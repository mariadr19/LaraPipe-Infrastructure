services:
  # Servidor Web (Nginx) - Container 1 
  nginx:
    image: nginx:alpine
    container_name: larapipe-web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # API (Laravel) - Container 2 
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: larapipe-api
    volumes:
      - ./src:/var/www/html
    working_dir: /var/www/html

  # Banco de Dados - Container 3
  db:
    image: mysql:8.0
    container_name: larapipe-db
    restart: always
    environment:
      MYSQL_DATABASE: larapipe_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      
volumes:
  db_data: